<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Transfer - PayBill</title>

    <style>
        /* ===== BACKGROUND ===== */
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea, #4ecdc4);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .header a {
            color: white;
            text-decoration: none;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            gap: 25px;
            margin-top: 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* ===== BANK GRID ===== */
        .bank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
        }

        .bank-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .bank-card:hover {
            transform: scale(1.05);
        }

        .bank-card img {
            width: 45px;
        }

        .bank-card.active {
            border: 2px solid #667eea;
            background: #eef2ff;
        }

        /* ===== INPUT ===== */
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* ===== BUTTON ===== */
        .btn {
            padding: 12px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a67d8;
        }

        /* ===== HISTORY ===== */
        .history-item {
            display: flex;
            justify-content: space-between;
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">
            <h2>🏦 Bank Transfer</h2>
            <a href="dashboard.html">← Dashboard</a>
        </div>

        <div class="grid" style="grid-template-columns:1fr 1fr">

            <!-- BANK SELECT -->
            <div class="card">
                <h3>Select Bank</h3>

                <div id="bankGrid" class="bank-grid"></div>

            </div>

            <!-- TRANSFER FORM -->
            <div class="card">
                <h3>Transfer Details</h3>

                <input id="beneName" placeholder="Beneficiary Name"><br><br>
                <input id="beneAccount" placeholder="Account Number"><br><br>

                <input id="beneIFSC" placeholder="IFSC Code" oninput="detectBankFromIFSC()"><br><br>

                <input id="transferAmount" type="number" placeholder="Amount"><br><br>

                <button class="btn" onclick="initiateTransfer()">💸 Transfer</button>

            </div>

        </div>

        <!-- HISTORY -->
        <div class="card">
            <h3>💳 Saved Beneficiaries</h3>

            <div id="beneficiaryList"></div>

            <button class="btn-add" onclick="addBeneficiary()">➕ Add Beneficiary</button>
        </div>
        <div class="card">
            <h3>📜 Transfer History</h3>
            <div id="historyList">Loading...</div>
        </div>

    </div>

    </div>

    </div>

    <script>
        const API = "http://localhost:5000";

        // BANK LIST
        const banks = [
            { name: "SBI", logo: "https://logo.clearbit.com/sbi.co.in" },
            { name: "HDFC", logo: "https://logo.clearbit.com/hdfcbank.com" },
            { name: "ICICI", logo: "https://logo.clearbit.com/icicibank.com" },
            { name: "Axis", logo: "https://logo.clearbit.com/axisbank.com" },
            { name: "PNB", logo: "https://logo.clearbit.com/pnbindia.in" }
        ];

        // LOAD BANKS
        function loadBanks() {
            const grid = document.getElementById("bankGrid");

            banks.forEach(bank => {
                const div = document.createElement("div");
                div.className = "bank-card";

                div.innerHTML = `
      <img src="${bank.logo}">
      <p>${bank.name}</p>
    `;

                div.onclick = () => selectBank(bank.name);

                grid.appendChild(div);
            });
        }

        // SELECT BANK
        function selectBank(name) {
            document.querySelectorAll(".bank-card").forEach(c => c.classList.remove("active"));

            const selected = [...document.querySelectorAll(".bank-card")]
                .find(c => c.innerText.includes(name));

            if (selected) selected.classList.add("active");

            document.getElementById("beneName").value = name;
        }

        // IFSC AUTO DETECT
        async function detectBankFromIFSC() {
            const ifsc = document.getElementById("beneIFSC").value;

            if (ifsc.length < 5) return;

            try {
                const res = await fetch(`https://ifsc.razorpay.com/${ifsc}`);
                const data = await res.json();

                const bank = data.BANK;

                document.getElementById("beneName").value = bank;

                banks.forEach(b => {
                    if (bank.toLowerCase().includes(b.name.toLowerCase())) {
                        selectBank(b.name);
                    }
                });

            } catch { }
        }

        // TRANSFER
        function initiateTransfer() {
            const data = {
                account: beneAccount.value,
                ifsc: beneIFSC.value,
                amount: transferAmount.value
            };

            fetch(API + "/bank-transfer", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(res => res.text())
                .then(msg => alert(msg));
        }

        // QUICK SELECT
        function transferTo(name) {
            beneName.value = name;
        }

        // INIT
        loadBanks();
    </script>
    <script>
        async function loadHistory() {
            let userId = null;

            try {
                const user = JSON.parse(localStorage.getItem("currentUser"));
                if (user && (user._id || user.id)) {
                    userId = user._id || user.id;
                }
            } catch { }

            if (!userId) return;

            try {
                const res = await fetch(API + "/history/" + userId);
                const data = await res.json();

                const container = document.getElementById("historyList");
                container.innerHTML = "";

                if (data.length === 0) {
                    container.innerHTML = "<p>No transactions yet</p>";
                    return;
                }

                data.reverse().forEach(txn => {
                    const div = document.createElement("div");
                    div.className = "history-item";

                    div.innerHTML = `
                <div>
                    <strong>${txn.remark || "Transfer"}</strong><br>
                    <small>${new Date(txn.createdAt).toLocaleString()}</small>
                </div>
                <div style="color:${txn.type === "credit" ? "green" : "red"}">
                    ${txn.type === "credit" ? "+" : "-"} ₹${txn.amount}
                </div>
            `;

                    container.appendChild(div);
                });

            } catch (err) {
                console.error(err);
                document.getElementById("historyList").innerHTML = "Error loading history";
            }
        }
    </script>

</body>

</html>
