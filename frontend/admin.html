<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            width: 200px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th,
        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #f1f5f9;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
        }

        .low {
            background: red;
        }

        .ok {
            background: green;
        }
    </style>
<link rel="stylesheet" href="styles/billing-bg.css">
</head>

<body>

    <header>
        👨‍💼 Admin Dashboard
    </header>

    <div class="container">

        <div class="card">

            <div class="top-bar">
                <button onclick="loadUsers()">Load Users</button>
                <input type="text" id="search" placeholder="Search mobile..." onkeyup="filterUsers()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Mobile</th>
                        <th>Balance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="users"></tbody>
            </table>

        </div>

    </div>

    <script>
        const API = "http://localhost:5000";
        let allUsers = [];

        // Load Users
        async function loadUsers() {
            const res = await fetch(API + "/admin/users");
            const data = await res.json();

            allUsers = data;
            displayUsers(data);
        }

        // Display Users
        function displayUsers(users) {
            const table = document.getElementById("users");
            table.innerHTML = "";

            users.forEach(u => {
                const row = document.createElement("tr");

                const status = u.balance < 100 ?
                    '<span class="badge low">Low</span>' :
                    '<span class="badge ok">Active</span>';

                row.innerHTML = `
      <td>${u.mobile}</td>
      <td>₹${u.balance}</td>
      <td>${status}</td>
    `;

                table.appendChild(row);
            });
        }

        // Search Filter
        function filterUsers() {
            const keyword = document.getElementById("search").value.toLowerCase();

            const filtered = allUsers.filter(u =>
                u.mobile.toLowerCase().includes(keyword)
            );

            displayUsers(filtered);
        }
    </script>

</body>

</html>
