<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PayBill</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Create Account</h1>
            <p class="text-center">Join PayBill and manage your payments effortlessly</p>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
            <div class="card">
                <h3 class="mb-20">Progress</h3>
                <div class="canvas-container">
                    <canvas id="progressCanvas" width="300" height="150"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 class="mb-20 text-center">Register Account</h3>
                
                <!-- Registration Form -->
                <form id="registerForm" class="flex-col" style="gap: 15px;">
                    <div>
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>
                    <div>
                        <label for="mobile">Mobile Number</label>
                        <input type="tel" id="mobile" placeholder="10-digit mobile number" required>
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <div>
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                    
                    <button type="submit" class="btn-primary mt-20">Create Account</button>
                </form>

                <!-- OTP Verification Section -->
                <div id="otpSection" style="display: none; gap: 15px; display: flex; flex-direction: column;">
                    <h3 style="text-align: center; color: #667eea;">Verify Your Mobile Number</h3>
                    <p style="text-align: center; color: #666; font-size: 14px;">An OTP has been sent to <strong id="otpMobile"></strong></p>
                    
                    <div>
                        <label for="otp">Enter OTP</label>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="off" required>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="verifyOtpBtn" class="btn-primary" style="flex: 1;">Verify OTP</button>
                        <button type="button" id="resendOtpBtn" class="btn-secondary" style="flex: 1;">Resend OTP</button>
                    </div>

                    <p style="text-align: center; font-size: 12px; color: #999;">
                        <span id="otpTimer">0:30</span> seconds remaining
                    </p>
                </div>

                <p class="text-center mt-20">
                    Already have an account? 
                    <a href="../login.html" style="color: #667eea; text-decoration: none; font-weight: bold;">Login</a>
                </p>
            </div>
        </div>

        <div id="successMessage" class="card" style="display: none; background: #d4edda;">
            <h3 class="text-success">✓ Account Created Successfully!</h3>
            <p>Your account has been created. <a href="../login.html">Click here to login</a></p>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000';
        let formProgress = 0;

        document.addEventListener('DOMContentLoaded', function() {
            drawProgressChart();
            setupFormListeners();
        });

        function setupFormListeners() {
            const form = document.getElementById('registerForm');
            const inputs = form.querySelectorAll('input');

            inputs.forEach(input => {
                input.addEventListener('input', updateProgress);
            });

            form.addEventListener('submit', handleRegister);
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('#registerForm input');
            const filledInputs = Array.from(inputs).filter(input => input.value.trim() !== '').length;
            formProgress = (filledInputs / inputs.length) * 100;
            drawProgressChart();
        }

        function drawProgressChart() {
            const canvas = document.getElementById('progressCanvas');
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.05)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.05)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Progress circle background
            ctx.fillStyle = '#e9ecef';
            ctx.beginPath();
            ctx.arc(80, 75, 50, 0, Math.PI * 2);
            ctx.fill();

            // Progress circle fill
            ctx.fillStyle = '#667eea';
            ctx.beginPath();
            ctx.arc(80, 75, 50, -Math.PI / 2, -Math.PI / 2 + (formProgress / 100) * Math.PI * 2);
            ctx.lineTo(80, 75);
            ctx.fill();

            // Progress text
            ctx.fillStyle = '#2d3436';
            ctx.font = 'bold 24px Inter';
            ctx.textAlign = 'center';
            ctx.fillText(Math.round(formProgress) + '%', 80, 85);

            // Labels
            ctx.font = '12px Inter';
            ctx.fillStyle = '#666';
            ctx.fillText('Form Complete', 80, 145);

            // Right side info
            ctx.font = '14px Inter';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#667eea';
            const steps = ['✓ Basic Info', '✓ Contact', '✓ Email', '✓ Password', '✓ Confirm'];
            steps.forEach((step, i) => {
                ctx.fillText(step, 180, 30 + (i * 20));
            });
        }

        async function handleRegister(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (mobile.length !== 10 || isNaN(mobile)) {
                alert('Please enter a valid 10-digit mobile number');
                return;
            }

            try {
                // Send OTP to mobile
                const otpResponse = await fetch(`${API_BASE_URL}/api/users/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, email })
                });

                if (otpResponse.ok) {
                    // Store registration data temporarily
                    sessionStorage.setItem('registrationData', JSON.stringify({ name, mobile, email, password }));
                    
                    // Show OTP section
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'flex';
                    document.getElementById('otpMobile').textContent = mobile;
                    
                    // Start OTP timer
                    startOtpTimer();
                    setupOtpVerification();
                } else {
                    alert('Failed to send OTP. Please try again.');
                }
            } catch (error) {
                alert('Error sending OTP');
                console.error(error);
            }
        }

        let otpTimerInterval;
        function startOtpTimer() {
            let timeLeft = 30;
            const timerElement = document.getElementById('otpTimer');
            
            otpTimerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimerInterval);
                    document.getElementById('verifyOtpBtn').disabled = true;
                    document.getElementById('resendOtpBtn').disabled = false;
                }
            }, 1000);
        }

        function setupOtpVerification() {
            document.getElementById('verifyOtpBtn').addEventListener('click', verifyOtp);
            document.getElementById('resendOtpBtn').addEventListener('click', resendOtp);
        }

        async function verifyOtp() {
            const otp = document.getElementById('otp').value;
            const registrationData = JSON.parse(sessionStorage.getItem('registrationData'));

            if (otp.length !== 6 || isNaN(otp)) {
                alert('Please enter a valid 6-digit OTP');
                return;
            }

            try {
                // Verify OTP and register
                const verifyResponse = await fetch(`${API_BASE_URL}/api/users/verify-otp-and-register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        otp,
                        name: registrationData.name,
                        mobile: registrationData.mobile,
                        email: registrationData.email,
                        password: registrationData.password
                    })
                });

                const data = await verifyResponse.json();

                if (verifyResponse.ok) {
                    clearInterval(otpTimerInterval);
                    document.getElementById('otpSection').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    sessionStorage.removeItem('registrationData');
                    
                    setTimeout(() => {
                        window.location.href = '../login.html';
                    }, 2000);
                } else {
                    alert(data.message || 'OTP verification failed');
                }
            } catch (error) {
                alert('Error verifying OTP');
                console.error(error);
            }
        }

        async function resendOtp() {
            const registrationData = JSON.parse(sessionStorage.getItem('registrationData'));
            
            try {
                const otpResponse = await fetch(`${API_BASE_URL}/api/users/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        mobile: registrationData.mobile, 
                        email: registrationData.email 
                    })
                });

                if (otpResponse.ok) {
                    alert('OTP resent successfully');
                    document.getElementById('otp').value = '';
                    startOtpTimer();
                } else {
                    alert('Failed to resend OTP');
                }
            } catch (error) {
                alert('Error resending OTP');
                console.error(error);
            }
        }
    </script>
</body>
</html>
